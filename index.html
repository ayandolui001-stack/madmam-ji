<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🤗 For Bidwiya 😊</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Parisienne&family=Montserrat:wght@400;700&family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #ff3f6c;
            --bg-grad: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
            --glass: rgba(255, 255, 255, 0.45);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            height: 100dvh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
            background: var(--bg-grad);
            background-size: 400% 400%;
            animation: bgMove 15s ease infinite;
            font-family: 'Quicksand', sans-serif;
            overflow: hidden; position: fixed;
            touch-action: none;
        }

        @keyframes bgMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #bg-music-container { position: absolute; width: 0; height: 0; visibility: hidden; }

        #magic-layer { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
        .drop { position: fixed; top: -10%; z-index: 2; animation: fall linear forwards; }
        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateY(110dvh) rotate(360deg); opacity: 0; }
        }

        .master-card {
            background: var(--glass); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 255, 255, 0.7);
            padding: 40px 25px; border-radius: 50px; text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
            width: 90%; max-width: 420px; min-height: 520px;
            display: flex; flex-direction: column; justify-content: center;
            z-index: 10; transition: transform 0.3s ease;
        }

        .badge-wrap { position: relative; width: 110px; height: 110px; margin: 0 auto 20px; }
        .b-badge {
            width: 100%; height: 100%; background: white; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Parisienne', cursive; font-size: 4.5rem; color: var(--primary);
            border: 6px double var(--primary);
            animation: badgeRotate 10s linear infinite;
        }
        @keyframes badgeRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        h1 { font-family: 'Parisienne', cursive; font-size: 2.8rem; color: #d63031; margin-bottom: 12px; }
        #msg-box { font-size: 1.05rem; color: #222; min-height: 110px; line-height: 1.6; margin-bottom: 25px; font-weight: 600; }

        .btn-group { position: relative; height: 80px; width: 100%; display: flex; justify-content: center; align-items: center; gap: 20px; }
        .btn {
            padding: 14px 25px; font-size: 0.95rem; font-weight: 700; border: none;
            border-radius: 100px; cursor: pointer; font-family: 'Montserrat', sans-serif;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #yesBtn { background: linear-gradient(45deg, #00b894, #55efc4); color: white; }
        
        /* Shifting "No" Button */
        #noBtn { 
            background: linear-gradient(45deg, #ff7675, #d63031); 
            color: white; 
            position: relative;
        }

        /* Teddy & Bubble Message */
        #teddy-container {
            position: fixed; bottom: 30px; right: 25px; z-index: 50;
            display: flex; flex-direction: column; align-items: center;
        }
        #teddy-bubble {
            background: white; color: #d63031; padding: 8px 12px;
            border-radius: 15px; font-size: 0.85rem; font-weight: 700;
            margin-bottom: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: none; border: 2px solid var(--primary);
            animation: popIn 0.3s forwards; white-space: nowrap;
        }
        @keyframes popIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .click-hint {
            background: var(--primary); color: white; padding: 5px 12px;
            border-radius: 15px; font-size: 0.7rem; font-weight: 700;
            margin-bottom: 5px; animation: bounce 2s infinite; pointer-events: none;
        }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        #teddy-companion { font-size: 4rem; cursor: pointer; animation: teddyFloat 3s infinite; }
        @keyframes teddyFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .floating-flower {
            position: fixed; pointer-events: none; z-index: 45;
            font-size: 2.5rem; animation: floatUp 1.5s ease-out forwards;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-280px) scale(2) rotate(45deg); opacity: 0; }
        }

        .gift-box { font-size: 7.5rem; cursor: pointer; animation: shakeGift 0.7s infinite; margin: 20px 0; }
        @keyframes shakeGift { 0%, 100% { transform: rotate(0); } 25% { transform: rotate(8deg); } 75% { transform: rotate(-8deg); } }

        .special-link-btn {
            display: inline-block; margin-top: 25px; padding: 14px 32px;
            background: linear-gradient(45deg, #6c5ce7, #a29bfe);
            color: white; text-decoration: none; border-radius: 50px;
            font-weight: 700; font-size: 1rem; animation: pulse 2s infinite;
        }
    </style>
</head>
<body onclick="initInteract(event)">

 

    <div id="magic-layer"></div>

    <div id="teddy-container">
        <div id="teddy-bubble"> Sorry from Ayan 🥺</div>
        <div class="click-hint">Please Click Me Bidwiya  🥺</div>
        <div id="teddy-companion" onclick="teddySurprise(event)">🧸</div>
    </div>

    <div class="master-card" id="mainCard">
        <div id="askStage">
            <div class="badge-wrap"><div class="b-badge">B</div></div>
            <h1>Sorry Bidwiya</h1>
            <div id="msg-box"></div>
            <div class="btn-group">
                <button class="btn" id="yesBtn" onclick="goToGift()">Khoma Korlam</button>
                <button class="btn" id="noBtn" onmouseover="shiftBtn()" onclick="shiftBtn()" ontouchstart="shiftBtn()">Korbo Na</button>
            </div>
        </div>

        <div id="gift-scene" style="display: none;">
            <h1 style="color: var(--primary);">A Surprise Gift</h1>
            <p>Box-ta te click koro Madam JI! 😊</p>
            <div class="gift-box" onclick="openGift()">🎁</div>
        </div>

        <div id="final-view" style="display: none;">
            <h1 style="color: #ff1493; font-size: 2.5rem;">Yes Madam Ji! 🌺</h1>
            <div style="font-size: 3.5rem; margin: 15px 0;">🌹🍫🍭</div>
            <p style="font-weight: 700; color: #333; font-size: 1.1rem; line-height: 1.7;">
                Thank you so much! <br>
                Amake Khoma korar jonno. <br>
                <span style="color: var(--primary); font-family: 'Parisienne'; font-size: 1.8rem; display: block; margin-top: 5px;">Thanks re, Bidwiya! 🥰</span>
            </p>
            <a href="https://domical-pamela-lambently.ngrok-free.dev" target="_blank" class="special-link-btn">
                Another Surprise Please Click 🎁
            </a>
        </div>
    </div>

    <script>
        let musicStarted = false;
        function initInteract(e) {
            createBubble(e);
            if(!musicStarted) {
                const music = document.getElementById('bg-music');
                music.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
                musicStarted = true;
            }
        }

        // --- TEDDY SURPRISE (FLOWER + MESSAGE) ---
        function teddySurprise(e) {
            e.stopPropagation();
            
            // Show Message
            const bubble = document.getElementById('teddy-bubble');
            bubble.style.display = 'block';
            setTimeout(() => { bubble.style.display = 'none'; }, 3000);

            // Create Flower
            const flower = document.createElement('div');
            flower.className = 'floating-flower';
            flower.innerHTML = '🌸';
            flower.style.right = '40px';
            flower.style.bottom = '80px';
            document.body.appendChild(flower);
            setTimeout(() => flower.remove(), 1500);
        }

        // --- SHIFTING BUTTON LOGIC ---
        function shiftBtn() {
            const btn = document.getElementById('noBtn');
            // Shifting by a small random amount (50px to 80px)
            const moveX = (Math.random() - 0.5) * 150; 
            const moveY = (Math.random() - 0.5) * 100;
            
            btn.style.transform = `translate(${moveX}px, ${moveY}px)`;
        }

        const apologyText = "Ami jani ami toka khub birkto kora chi. sorry re sob kichur jone ar ato message kora jone? ki kjor bo na message kora thka tha pare na ....moto maaf kore dabna 🥺! ar Next Exam jone good luck re 😊";
        const typingArea = document.getElementById('msg-box');
        let index = 0;

        function startTyping() {
            if (index < apologyText.length) {
                typingArea.innerHTML = apologyText.substring(0, index + 1);
                index++;
                setTimeout(startTyping, 45);
            }
        }
        window.onload = startTyping;

        const magicLayer = document.getElementById('magic-layer');
        let activeIcons = ['🌸', '🌺', '🌹', '✨', '🌼'];

        function spawnDrop() {
            const drop = document.createElement('div');
            drop.className = 'drop';
            drop.innerHTML = activeIcons[Math.floor(Math.random() * activeIcons.length)];
            drop.style.left = Math.random() * 100 + 'vw';
            drop.style.fontSize = Math.random() * 20 + 20 + 'px';
            drop.style.animationDuration = Math.random() * 2 + 3 + 's';
            magicLayer.appendChild(drop);
            setTimeout(() => drop.remove(), 5000);
        }
        setInterval(spawnDrop, 450);

        function goToGift() {
            document.getElementById('askStage').style.display = 'none';
            document.getElementById('gift-scene').style.display = 'block';
        }

        function openGift() {
            document.getElementById('gift-scene').style.display = 'none';
            document.getElementById('final-view').style.display = 'block';
            activeIcons = ['🌹', '🍫', '🎁', '🧸', '✨'];
            for(let i=0; i<40; i++) setTimeout(spawnDrop, i*80);
        }

        function createBubble(e) {
            const x = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            const y = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            const b = document.createElement('div');
            b.style.position = 'fixed'; b.style.width = '12px'; b.style.height = '12px';
            b.style.background = 'rgba(255,255,255,0.6)'; b.style.borderRadius = '50%';
            b.style.left = x + 'px'; b.style.top = y + 'px';
            b.style.pointerEvents = 'none';
            document.body.appendChild(b);
            b.animate([{ transform: 'scale(1)', opacity: 1 }, { transform: 'scale(4) translateY(-50px)', opacity: 0 }], 700);
            setTimeout(() => b.remove(), 700);
        }
    </script>
</body>
</html>
